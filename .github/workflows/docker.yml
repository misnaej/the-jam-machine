name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "src/jammy/**"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "src/jammy/**"
      - "pyproject.toml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build

      - name: Start container
        run: docker compose up -d

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -s http://localhost:7860 > /dev/null; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting... ($i/60)"
            sleep 5
          done
          echo "App failed to start"
          docker compose logs
          exit 1

      - name: Stop container
        if: always()
        run: docker compose down
